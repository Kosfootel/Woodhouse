name: Auto-Assign Reviewer

on:
  pull_request:
    types: [opened, reopened]

jobs:
  auto-assign:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Auto-assign reviewers from CODEOWNERS
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Read CODEOWNERS file
            const codeownersPath = path.join(process.env.GITHUB_WORKSPACE, '.github', 'CODEOWNERS');
            
            if (!fs.existsSync(codeownersPath)) {
              console.log('No CODEOWNERS file found');
              return;
            }
            
            const codeownersContent = fs.readFileSync(codeownersPath, 'utf8');
            const prFiles = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });
            
            const changedFiles = prFiles.data.map(f => f.filename);
            const reviewers = new Set();
            
            // Parse CODEOWNERS and find matching reviewers
            const lines = codeownersContent.split('\n');
            
            for (const line of lines) {
              const trimmed = line.trim();
              if (!trimmed || trimmed.startsWith('#')) continue;
              
              const parts = trimmed.split(/\s+/);
              const pattern = parts[0];
              const owners = parts.slice(1);
              
              // Check if any changed file matches this pattern
              const matches = changedFiles.some(file => {
                // Simple glob matching
                const regex = pattern
                  .replace(/\*\*/g, '___DOUBLESTAR___')
                  .replace(/\*/g, '[^/]*')
                  .replace(/___DOUBLESTAR___/g, '.*')
                  .replace(/\?/g, '.');
                return new RegExp(regex).test(file);
              });
              
              if (matches) {
                owners.forEach(owner => {
                  // Remove @ prefix if present
                  const reviewer = owner.replace(/^@/, '');
                  // Skip teams (contain '/'), only add users
                  if (!reviewer.includes('/')) {
                    reviewers.add(reviewer);
                  }
                });
              }
            }
            
            // Remove PR author from reviewers
            reviewers.delete(context.payload.pull_request.user.login);
            
            if (reviewers.size > 0) {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                reviewers: Array.from(reviewers)
              });
              console.log(`Requested reviews from: ${Array.from(reviewers).join(', ')}`);
            } else {
              console.log('No reviewers found from CODEOWNERS');
            }
